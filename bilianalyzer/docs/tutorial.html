<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <title>教程</title>

<body style=" font-family:'Microsoft YaHei UI'; font-size:14pt; font-weight:400; font-style:normal;">
    <h1>BiliAnalyzer教程</h1>
    <h2>快速上手</h2>
    <p>
        在资源ID处输入视频的AV号<br>
        并选择资源类型为视频<br>
        设定结束索引为一个较大整数<br>
        设定索引间隔约为20<br>

    </p>
    <h2>获取资源ID</h2>
    <table border="1">
        <tr>
            <td>资源类型</td>
            <td>资源ID</td>
        </tr>
        <tr>
            <td>视频</td>
            <td>视频对应的AV号</td>
        </tr>
        <tr>
            <td>动态</td>
            <td>动态对应的URL中t.bilibili.com/到?之间的数值</td>
        </tr>
        <tr>
            <td>画册(带图动态)</td>
            <td>动态对应的URL中t.bilibili.com/到?之间的数值</td>
        </tr>
    </table>
    <a href="https://nemo2011.github.io/bilibili-api/#/modules/comment">具体细节请见文档</a>

    <br/>
